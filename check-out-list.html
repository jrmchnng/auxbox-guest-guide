<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Out List | Aux Box Guest Guide</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page-shell">
    <div class="utility-bar sticky-home">
      <a class="utility-link" href="index.html">Back to guide home</a>
    </div>

    <section class="hero-card">
      <h1>Check-Out Instructions</h1>
      <p>Before you leave, please take a few moments to complete the following steps.</p>
      <!-- <div class="hero-meta">
        <span class="meta-chip">Dishes</span>
        <span class="meta-chip">Garbage</span>
        <span class="meta-chip">Outdoor gear return</span>
      </div> -->
    </section>

    <section class="content-grid">
      <article class="panel span-12">
        <ul class="checklist">
          <li>
            <input class="check-item" type="checkbox" id="checkout-dishes">
            <label class="check-label" for="checkout-dishes">Wash and put away all dishes and cookware.</label>
          </li>
          <li>
            <input class="check-item" type="checkbox" id="checkout-garbage">
            <label class="check-label" for="checkout-garbage">Dispose of all garbage in the blue dumpster located near the parking area.</label>
          </li>
          <li>
            <input class="check-item" type="checkbox" id="checkout-gear">
            <label class="check-label" for="checkout-gear">Ensure the canoe, paddles, and life jackets have been returned to their designated storage locations.</label>
          </li>
          <li>
            <input class="check-item" type="checkbox" id="checkout-report">
            <label class="check-label" for="checkout-report">Let us know if anything was not working properly or requires attention for future guests.</label>
          </li>
        </ul>
      </article>

      <article class="panel panel-dark span-12">
        <h2>Thank You</h2>
        <p>Thank you for staying with us. We hope you enjoyed your time at the Aux Box and we look forward to welcoming
          you back.</p>
      </article>
    </section>
  </main>
</body>

</html>
